<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Abdallah Hassoun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafafa;
        color: #111827;
        font-family: "DM Sans", sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 480px;
        animation: fade-up 0.6s cubic-bezier(0.21, 1.02, 0.47, 0.98) both;
      }
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h1 {
        font-family: Sora, sans-serif;
        font-size: 5rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, #2563eb, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.1rem;
        color: #4b5563;
        line-height: 1.625;
        margin-bottom: 2rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.75rem;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      a:hover {
        opacity: 0.9;
      }
      a:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
      @media (prefers-reduced-motion: reduce) {
        .container {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Page not found. The link you followed may be broken or the page has been moved.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
